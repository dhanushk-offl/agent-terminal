name: Release (Linux: AppImage + DEB)

on:
  push:
    tags:
      - 'v[0-9]*'

permissions:
  contents: write

jobs:
  release-linux:
    name: Build + draft release (Linux AppImage + DEB)
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Cache Cargo registry + build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-${{ runner.arch }}-cargo-linux-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-cargo-linux-

      - name: Install frontend dependencies
        run: bun install

      - name: Install Linux build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libssl-dev appimagekit

      - name: Build Tauri (AppImage + deb)
        run: |
          bun run build
          bun run tauri:build:linux

      - name: Create draft release with Linux artifacts
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: 'Automated Linux release artifacts (AppImage + deb)'
          files: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/appimage/*.AppImage
          fail_on_unmatched_files: false
