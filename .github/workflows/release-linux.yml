# Tag-triggered Linux release.
#
# Push a `v*` tag (e.g. `v0.1.0`, `v0.2.0-rc.1`) → this workflow builds Linux
# .deb + .AppImage (x86_64) and aarch64 AppImage, then attaches them to the
# DRAFT release created by release.yml.
#
# This workflow always runs, even if the macOS release.yml fails — `!cancelled()`
# means it only skips when the entire workflow run is manually cancelled.
# This ensures Linux artifacts are always produced regardless of macOS signing
# issues.

name: Release (Linux)

on:
  push:
    tags:
      - 'v[0-9]*'

permissions:
  contents: write

jobs:
  # ---------------------------------------------------------------------------
  # x86_64 Linux: .deb + .AppImage
  # ---------------------------------------------------------------------------
  release-linux-x64:
    name: Linux x86_64 (.deb + .AppImage)
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Tauri Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry + build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend dependencies
        run: bun install

      - name: Tauri build (Linux x86_64)
        uses: tauri-apps/tauri-action@v0
        with:
          args: ""

      - name: Attach Linux x86_64 artifacts to draft release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          files: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/appimage/*.AppImage

  # ---------------------------------------------------------------------------
  # ARM64 Linux: AppImage (for ARM servers / Raspberry Pi 4/5)
  # ---------------------------------------------------------------------------
  release-linux-arm64:
    name: Linux arm64 (AppImage)
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Tauri Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - name: Install Rust toolchain (aarch64 target)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu

      - name: Install cross-compilation toolchain
        run: |
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Cache Cargo registry + build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend dependencies
        run: bun install

      - name: Tauri build (Linux arm64)
        uses: tauri-apps/tauri-action@v0
        with:
          args: --target aarch64-unknown-linux-gnu

      - name: Attach Linux arm64 artifacts to draft release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          files: |
            src-tauri/target/aarch64-unknown-linux-gnu/release/bundle/appimage/*.AppImage